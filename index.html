<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>IOVOZAURS | COUNTER 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex; justify-content: center; align-items: center;
        }

        /* Кнопка включения звука */
        #leto-btn {
            position: fixed; bottom: 30px; z-index: 100;
            padding: 15px 30px; background: #333; color: #fff;
            border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* КАРТОЧКА БЕЗ ПРОЗРАЧНОСТИ */
        .premium-card {
            background: #222; /* Полностью темный фон, теперь всё видно! */
            border-radius: 50px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            border: 4px solid #fff; /* Жирная рамка для стиля */
            width: 80%;
            max-width: 700px;
        }

        .title {
            font-weight: 400; font-size: 1.8rem; color: #ff9a9e; /* Розовый акцент */
            letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px;
        }

        .class-name {
            font-weight: 900; font-size: 4rem; color: #fff;
            margin-bottom: 30px;
        }

        .counter-container {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
        }

        .unit { 
            background: #333; padding: 20px; border-radius: 20px; min-width: 120px; 
        }

        .val {
            font-size: 4.5rem; font-weight: 900; color: #fff700; /* Ярко-желтые цифры */
            display: block; line-height: 1;
        }

        .lab {
            font-size: 1rem; color: #bbb;
            text-transform: uppercase; letter-spacing: 3px; margin-top: 10px;
        }

        .copyright {
            margin-top: 50px; color: #777; font-size: 0.8rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <audio id="audio" src="https://www.myinstants.com/media/sounds/leto-or-shout.mp3"></audio>
    <button id="leto-btn" onclick="document.getElementById('audio').play(); this.style.display='none'">🔊 ДЫБЫСТЫ ҚОСУ</button>

    <div class="premium-card">
        <div class="title">Жазғы демалысқа:</div>
        <div class="class-name" id="class-tag">...</div>
        
        <div class="counter-container">
            <div class="unit"><span class="val" id="d">00</span><span class="lab">Күн</span></div>
            <div class="unit"><span class="val" id="h">00</span><span class="lab">Сағат</span></div>
            <div class="unit"><span class="val" id="m">00</span><span class="lab">Мин</span></div>
            <div class="unit"><span class="val" id="s">00</span><span class="lab">Сек</span></div>
        </div>
        
        <div class="copyright">
          ©️IOVOZAURS-TEAM // 2026 PROTECTED
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            const year = now.getFullYear();
            let month = now.getMonth();
            
            let grade = 5 + (year - 2026);
            if (month >= 8) grade++;
            
            const classTag = document.getElementById("class-tag");
            if (classTag) classTag.innerHTML = `${grade} «Г» СЫНЫБЫ`;

            const target = new Date(year, 5, 1);
            let diff = target - now;

            if (diff <= 0 && month < 8) {
                document.querySelector(".title").innerHTML = "ҚАЙФУЕМ!";
                if (classTag) classTag.innerHTML = "ЖАЗ КЕЛДІ!";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById("d").innerHTML = d.toString().padStart(2, '0');
            document.getElementById("h").innerHTML = h.toString().padStart(2, '0');
            document.getElementById("m").innerHTML = m.toString().padStart(2, '0');
            document.getElementById("s").innerHTML = s.toString().padStart(2, '0');
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
