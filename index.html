<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Счетчик до лета</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            /* 8 наурыздағыдай жұмсақ градиент, бірақ жазғы түстер */
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            display: flex; justify-content: center; align-items: center;
        }

        /* АНИМАЦИЯЛЫҚ БӨЛШЕКТЕР ( Particles ) */
        .particle {
            position: absolute; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; pointer-events: none;
            animation: move 15s infinite linear;
        }

        @keyframes move {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ПРЕМИУМ КАРТОЧКА */
        .premium-card {
            background: rgba(255, 255, 255, 0,2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 50px;
            padding: 70px 50px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
            animation: cardAppear 2s ease-out;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .title {
            font-weight: 300; font-size: 1.5rem; color: #fff;
            letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px;
        }

        .class-name {
            font-weight: 700; font-size: 3rem; color: #fff;
            margin-bottom: 40px; text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .counter-container {
            display: flex; gap: 40px; justify-content: center;
        }

        .unit { text-align: center; }

        .val {
            font-size: 4.5rem; font-weight: 700; color: #fff;
            display: block; line-height: 1;
        }

        .lab {
            font-size: 1rem; color: rgba(255,255,255,1);
            text-transform: uppercase; letter-spacing: 5px; margin-top: 15px;
        }

        #leto-btn {
            position: fixed; bottom: 30px;
            padding: 15px 30px; background: #fff; color: #ff9a9e;
            border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            let size = Math.random() * 60 + 10 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 15 + 's';
            document.body.appendChild(p);
        }
    </script>

    <audio id="audio" src="https://www.myinstants.com/media/sounds/leto-or-shout.mp3"></audio>
    <button id="leto-btn" onclick="document.getElementById('audio').play(); this.style.display='none'">🔊 ДЫБЫСТЫ ҚОСУ</button>

    <div class="premium-card">
        <div class="title">Жазғы демалысқа:</div>
        
        <div class="counter-container">
            <div class="unit"><span class="val" id="d">00</span><span class="lab">Күн</span></div>
            <div class="unit"><span class="val" id="h">00</span><span class="lab">Сағат</span></div>
            <div class="unit"><span class="val" id="m">00</span><span class="lab">Мин</span></div>
            <div class="unit"><span class="val" id="s">00</span><span class="lab">Сек</span></div>
        </div>
        
        <div style="margin-top: 50px; color: #fff; opacity: 0.6; font-size: 0.7rem; letter-spacing: 4px;">
          ©️IOVOZAURS-TEAM// 2026 ALL COPYRIGHT INFORMATION Protected
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            const year = now.getFullYear();
            let month = now.getMonth();
            
            // Сынып логикасы
            let grade = 5 + (year - 2026);
            if (month >= 8) grade++;
            document.getElementById("class-tag").innerHTML = `${grade} «Г» СЫНЫБЫ`;

            const target = new Date(year, 5, 1);
            const diff = target - now;

            if (diff <= 0 && month < 8) {
                document.querySelector(".title").innerHTML = "ҚАЙФУЕМ!";
                document.getElementById("class-tag").innerHTML = "ЖАЗ КЕЛДІ!";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById("d").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("h").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("m").innerHTML = mins.toString().padStart(2, '0');
            document.getElementById("s").innerHTML = secs.toString().padStart(2, '0');
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
